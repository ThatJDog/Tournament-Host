<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Player Editor</title>
<style>
  .entry {
    border: 1px solid #ccc;
    padding: 12px;
    margin-bottom: 8px;
    position: relative;
  }
  .entry button.remove-entry {
    position: absolute;
    top: 4px;
    right: 4px;
  }
  .array-item {
    display: flex;
    gap: 4px;
    margin-bottom: 4px;
  }
</style>
</head>
<body>

<h1>Player Editor</h1>
<button id="pickProjectBtn">Pick Project Folder</button>
<div id="players-container"></div>
<button id="add-entry">Add Player</button>
<button id="saveBtn">Save</button>

<script>
let projectFolderHandle = null;
let schemaFileHandle = null;
let dataFileHandle = null;
let playersSchema = null;
let playersData = [];

// Pick project folder
document.getElementById('pickProjectBtn').addEventListener('click', async () => {
    try {
        projectFolderHandle = await window.showDirectoryPicker();
        await loadPlayersFiles();
        renderPlayers();
        alert("Project folder loaded!");
    } catch (err) {
        console.error(err);
        alert("Folder selection cancelled or failed.");
    }
});

// Load schema and data JSON from picked folder
async function loadPlayersFiles() {
    if (!projectFolderHandle) throw new Error("Pick a project folder first");

    schemaFileHandle = await projectFolderHandle.getFileHandle("players.h.json");
    dataFileHandle = await projectFolderHandle.getFileHandle("players.d.json", { create: true });

    const schemaFile = await schemaFileHandle.getFile();
    const schemaText = await schemaFile.text();
    playersSchema = JSON.parse(schemaText);

    const dataFile = await dataFileHandle.getFile();
    const dataText = await dataFile.text();
    playersData = dataText ? JSON.parse(dataText) : [];
}

// Create a field based on schema
function createField(fieldDef, value) {
    if (fieldDef.type === "string") {
        const input = document.createElement("input");
        input.type = "text";
        input.value = value || "";
        input.dataset.field = fieldDef.name;
        return input;
    } else if (fieldDef.type === "array") {
        const container = document.createElement("div");
        container.dataset.field = fieldDef.name;

        (value || []).forEach(v => {
            const itemDiv = createArrayItem(v);
            container.appendChild(itemDiv);
        });

        const addBtn = document.createElement("button");
        addBtn.type = "button";
        addBtn.textContent = "Add item";
        addBtn.onclick = () => container.insertBefore(createArrayItem(""), addBtn);
        container.appendChild(addBtn);

        return container;
    }
}

// Create a single array item
function createArrayItem(value) {
    const div = document.createElement("div");
    div.className = "array-item";
    const input = document.createElement("input");
    input.type = "text";
    input.value = value || "";
    div.appendChild(input);
    const removeBtn = document.createElement("button");
    removeBtn.type = "button";
    removeBtn.textContent = "X";
    removeBtn.onclick = () => div.remove();
    div.appendChild(removeBtn);
    return div;
}

// Render all players
function renderPlayers() {
    const container = document.getElementById("players-container");
    container.innerHTML = "";

    playersData.forEach((entry, idx) => {
        const entryDiv = document.createElement("div");
        entryDiv.className = "entry";

        // Remove entry button
        const removeEntryBtn = document.createElement("button");
        removeEntryBtn.type = "button";
        removeEntryBtn.textContent = "Remove Player";
        removeEntryBtn.className = "remove-entry";
        removeEntryBtn.onclick = () => {
            playersData.splice(idx, 1);
            renderPlayers();
        };
        entryDiv.appendChild(removeEntryBtn);

        // Render fields
        playersSchema.fields.forEach(f => {
            const label = document.createElement("label");
            label.textContent = f.name + ": ";
            const fieldEl = createField(f, entry[f.name]);
            label.appendChild(fieldEl);
            entryDiv.appendChild(label);
            entryDiv.appendChild(document.createElement("br"));
        });

        container.appendChild(entryDiv);
    });
}

// Collect data from form
function collectData() {
    const container = document.getElementById("players-container");
    const newData = [];
    container.querySelectorAll(".entry").forEach(entryDiv => {
        const entryObj = {};
        playersSchema.fields.forEach(f => {
            const fieldEl = entryDiv.querySelector(`[data-field="${f.name}"]`);
            if (!fieldEl) return;
            if (f.type === "string") {
                entryObj[f.name] = fieldEl.value;
            } else if (f.type === "array") {
                const arr = [];
                fieldEl.querySelectorAll("input").forEach(i => arr.push(i.value));
                entryObj[f.name] = arr;
            }
        });
        newData.push(entryObj);
    });
    return newData;
}

// Save data to the same file
async function savePlayersData() {
    if (!dataFileHandle) {
        alert("No data file handle available. Pick project folder first.");
        return;
    }
    playersData = collectData();
    const writable = await dataFileHandle.createWritable();
    await writable.write(JSON.stringify(playersData, null, 2));
    await writable.close();
    alert("Players saved successfully!");
}

// Add new entry
document.getElementById("add-entry").addEventListener("click", () => {
    if (!playersSchema) return alert("Pick project folder first.");
    const newEntry = {};
    playersSchema.fields.forEach(f => {
        if (f.type === "array") newEntry[f.name] = [];
        else newEntry[f.name] = "";
    });
    playersData.push(newEntry);
    renderPlayers();
});

// Save button
document.getElementById("saveBtn").addEventListener("click", savePlayersData);
</script>
</body>
</html>
