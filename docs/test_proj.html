<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local Project Manager</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 40px auto; }
    button { margin: 6px 6px 6px 0; padding: 8px 12px; }
    input { padding: 6px; width: 240px; }
    pre { background: #111; color: #0f0; padding: 12px; overflow:auto; }
  </style>
</head>
<body>
  <h1>Local Project Manager</h1>

  <section>
    <h2>Create Project</h2>
    <input id="projectName" placeholder="Project name" />
    <button id="pickDirBtn">Choose Parent Folder</button>
    <button id="createBtn" disabled>Create Project</button>
  </section>

  <section>
    <h2>Open Existing Project File</h2>
    <button id="openFileBtn">Open project.xml</button>
  </section>

  <section>
    <h2>File Contents</h2>
    <pre id="output">(nothing loaded)</pre>
  </section>

  <script src="js/app.js"></script>
</body>
</html>
